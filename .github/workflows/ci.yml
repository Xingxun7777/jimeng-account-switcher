name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  regression:
    name: Playwright regression (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium with Linux dependencies
        if: runner.os == 'Linux'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright Chromium
        if: runner.os != 'Linux'
        run: npx playwright install chromium

      - name: Syntax check
        run: npm run lint:syntax

      - name: Playwright extension regression
        run: npm test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.os }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

  webextension-lint:
    name: WebExtension lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint manifest and extension package
        run: >-
          npx web-ext lint
          --source-dir .
          --self-hosted
          --ignore-files node_modules test-results playwright-report .auth .agent .git .backup-v1.0.0 package-lock.json
